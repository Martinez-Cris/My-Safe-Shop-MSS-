name: Build and deploy Node.js app to Azure Web App - mysafeshop-api

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: '22.x'

      # 1. Instalar dependencias
      - name: Install dependencies
        working-directory: backend
        run: npm install

      # 2. Build NestJS (genera dist/)
      - name: Build NestJS
        working-directory: backend
        run: npm run build

      # 3. Verificar que dist existe (DEBUG útil)
      - name: Check dist folder
        working-directory: backend
        run: ls -R dist

      # 4. Subir artefacto YA compilado
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend
          path: backend


  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: backend

      # 5. Deploy correcto a Azure
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: mysafeshop-api
          slot-name: Production
          package: backend
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_250B9D21084743C29565480EC2E45656 }}
