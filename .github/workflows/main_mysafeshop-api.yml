name: Build and deploy Node.js app to Azure Web App - mysafeshop-api

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: '22.x'

      # 1. Instalar dependencias en backend
      - name: Install dependencies
        working-directory: backend
        run: npm install

      # 2. COMPILAR NestJS (ESTO CREA /dist)
      - name: Build NestJS
        working-directory: backend
        run: npm run build

      # 3. Subir SOLO lo necesario (incluye dist)
      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: backend


  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app

      # 4. Deploy a Azure App Service
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: mysafeshop-api
          slot-name: Production
          package: .
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_250B9D21084743C29565480EC2E45656 }}
